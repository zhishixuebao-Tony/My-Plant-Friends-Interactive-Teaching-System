<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <!-- 定义区域 -->
  <defs>
    <!-- 定义单个太阳光芒的形状 -->
    <path id="ray" d="M 104,75 L 120,16 L 136,75 Z" fill="#FBCF4F" stroke="#A65523" stroke-width="4.5" stroke-linejoin="round" />
    
    <!-- 定义中心圆形的遮罩区，用于完美切割高光和阴影月牙 -->
    <clipPath id="inner-circle">
      <circle cx="120" cy="120" r="69.5" />
    </clipPath>
  </defs>

  <!-- 1. 旋转复制出 12 个光芒角 -->
  <g>
    <use href="#ray" />
    <use href="#ray" transform="rotate(30 120 120)" />
    <use href="#ray" transform="rotate(60 120 120)" />
    <use href="#ray" transform="rotate(90 120 120)" />
    <use href="#ray" transform="rotate(120 120 120)" />
    <use href="#ray" transform="rotate(150 120 120)" />
    <use href="#ray" transform="rotate(180 120 120)" />
    <use href="#ray" transform="rotate(210 120 120)" />
    <use href="#ray" transform="rotate(240 120 120)" />
    <use href="#ray" transform="rotate(270 120 120)" />
    <use href="#ray" transform="rotate(300 120 120)" />
    <use href="#ray" transform="rotate(330 120 120)" />
  </g>

  <!-- 2. 太阳主体的基础黄底色和棕色粗描边 -->
  <circle cx="120" cy="120" r="72" fill="#FBCF4F" stroke="#A65523" stroke-width="4.5" />

  <!-- 3. 利用遮罩层制作完美的赛璐璐阴影和高光月牙 -->
  <g clip-path="url(#inner-circle)">
    <!-- 右下角的深橙色阴影底 -->
    <circle cx="120" cy="120" r="70" fill="#F2A132" />
    
    <!-- 中间色层（往左上角微移，把右下角露出月牙阴影） -->
    <circle cx="114" cy="114" r="70" fill="#F9BD3F" />

    <!-- 左上角的亮黄色高光底（再往左上角微移） -->
    <circle cx="106" cy="106" r="66" fill="#FBE273" />
    
    <!-- 最后用中间色盖住高光底的中心（把左上角露出月牙高光） -->
    <circle cx="116" cy="116" r="66" fill="#F9BD3F" />
  </g>

  <!-- 4. 左上角可爱的小椭圆反光点 -->
  <ellipse cx="80" cy="80" rx="9" ry="4.5" transform="rotate(-35 80 80)" fill="#FFFFFF" opacity="0.65" />
</svg>